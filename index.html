<head>

    :root {
      --ink: #1f2528;
      --muted: #6b7378;
      --line: #d8ded9;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --accent: #b23a48;
      --accent-dark: #832734;
      --green: #2d6a4f;
      --blue: #35628b;
      --gold: #9a6b1f;
      --shadow: 0 10px 28px rgba(31, 37, 40, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      line-height: 1.55;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(360px, 430px) 1fr;
      min-height: 100vh;
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: auto;
      max-height: 100vh;
    }

    header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 25px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      padding: 14px 22px;
      display: grid;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .control-label {
      display: block;
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 6px;
    }

    input[type="search"],
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .chip.active {
      border-color: var(--accent);
      background: #fff2f3;
      color: var(--accent-dark);
      font-weight: 700;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 22px 8px;
    }

    .list-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .shop-list {
      display: grid;
      gap: 10px;
      padding: 0 14px 22px;
    }

    .maintenance {
      margin: 0 14px 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf9;
      overflow: hidden;
    }

    .maintenance summary {
      cursor: pointer;
      padding: 13px 14px;
      font-weight: 700;
      font-size: 14px;
    }

    .maintenance-body {
      display: grid;
      gap: 12px;
      padding: 0 14px 14px;
      border-top: 1px solid var(--line);
    }

    .maintenance p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    .action-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .action-button.warn {
      color: var(--accent-dark);
      border-color: #e2b8bd;
      background: #fff5f6;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--ink);
      background: #fff;
    }

    .update-log {
      min-height: 30px;
      border-radius: 8px;
      padding: 8px 10px;
      background: #f4f6f4;
      color: var(--muted);
      font-size: 12px;
      white-space: pre-wrap;
    }

    .link-list {
      display: grid;
      gap: 6px;
      max-height: 160px;
      overflow: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .link-list a {
      color: var(--accent-dark);
      font-size: 12px;
      text-decoration: none;
    }

    .shop-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
    }

    .shop-card:hover,
    .shop-card.active {
      border-color: var(--accent);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .shop-card.visited {
      border-color: #9fc7b2;
      background: #fbfffc;
    }

    .shop-title {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .shop-name {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .rank {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: #f7e8cc;
      color: #6c4711;
      font-size: 12px;
      font-weight: 700;
    }

    .visited-toggle {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      padding: 5px 8px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .visited-toggle.active {
      border-color: #75a98e;
      background: #eef8f1;
      color: #245b43;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 6px;
      padding: 3px 7px;
      background: #f4f6f4;
      color: var(--muted);
      font-size: 12px;
    }

    .tag.area-tokyo { color: #7a2430; background: #fff0f1; }
    .tag.area-kanagawa { color: #1d5d7c; background: #edf7fb; }
    .tag.area-saitama { color: #2f654d; background: #eef8f1; }
    .tag.area-chiba { color: #7a4c12; background: #fff5df; }
    .tag.area-north { color: #4e4c88; background: #f1f0ff; }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      position: relative;
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #e9eee8;
    }

    .map-note {
      position: absolute;
      left: 14px;
      bottom: 20px;
      z-index: 550;
      max-width: min(560px, calc(100% - 28px));
      padding: 10px 12px;
      border: 1px solid rgba(216, 222, 217, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--muted);
      font-size: 12px;
      box-shadow: var(--shadow);
    }

    .popup h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .popup p {
      margin: 5px 0;
      color: #3e464a;
    }

    .popup a {
      display: inline-flex;
      margin-top: 6px;
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .leaflet-marker-icon {
      filter: drop-shadow(0 4px 8px rgba(31, 37, 40, 0.24));
    }

    .legend {
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 550;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px;
      border: 1px solid rgba(216, 222, 217, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .legend-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;

        border-bottom: 1px solid var(--line);
      }

      #map {

        padding-right: 16px;
      }

      h1 {

      }

      .shop-list {
        padding-left: 10px;
        padding-right: 10px;
      }

      .maintenance {
        margin-left: 10px;
        margin-right: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header>
        <h1>関東有名ケーキ店・カフェマップ</h1>
        <p class="lead">名店感、駅からの行きやすさ、散歩との組み合わせで選ぶための地図。ケーキ店とカフェを切り替えて表示できます。</p>
      </header>

      <section class="controls" aria-label="絞り込み">
        <label>
          <span class="control-label">店名・駅・おすすめで検索</span>
          <input id="searchInput" type="search" placeholder="例: ミルフィーユ、清澄白河、モンブラン">
        </label>

        <label>
          <span class="control-label">エリア</span>
          <select id="areaSelect">
            <option value="all">すべて</option>
            <option value="tokyo-east">東京 東側・都心東</option>
            <option value="tokyo-west">東京 西側・多摩</option>
            <option value="tokyo-south">東京 南側・城南</option>
            <option value="tokyo-north">東京 北側</option>
            <option value="kanagawa">神奈川</option>
            <option value="saitama">埼玉</option>
            <option value="chiba">千葉</option>
            <option value="north-kanto">北関東</option>
          </select>
        </label>

        <div>
          <span class="control-label">表示</span>
          <div class="chips" id="categoryChips">
            <button class="chip active" data-category="all">すべて</button>
            <button class="chip" data-category="cake">ケーキ</button>
            <button class="chip" data-category="cafe">カフェ</button>
          </div>
        </div>

        <div>
          <span class="control-label">タイプ</span>
          <div class="chips" id="typeChips">
            <button class="chip active" data-type="all">すべて</button>
            <button class="chip" data-type="top">名店・遠征級</button>
            <button class="chip" data-type="walk">散歩向き</button>
            <button class="chip" data-type="gift">手土産</button>
            <button class="chip" data-type="salon">イートイン/サロン</button>
          </div>
        </div>

        <div>
          <span class="control-label">訪問状況</span>
          <div class="chips" id="visitedChips">
            <button class="chip active" data-visited="all">すべて</button>
            <button class="chip" data-visited="visited">行った</button>
            <button class="chip" data-visited="unvisited">未訪問</button>
          </div>
        </div>
      </section>

      <div class="list-head">
        <h2>候補一覧</h2>
      </div>
      <section class="shop-list" id="shopList" aria-label="ケーキ店・カフェ一覧"></section>

      <details class="maintenance">
        <summary>データ更新</summary>
        <div class="maintenance-body">
          <p>候補探しと閉店確認をまとめて開始します。外部サイト側の制約があるため自動巡回はせず、確認用リンクをまとめて開ける形にしています。</p>
          <div class="button-row">
            <button class="action-button primary" id="runUpdateCheck" type="button">更新チェックを開始</button>
          </div>
          <div class="update-log" id="updateLog">更新操作の結果がここに表示されます。</div>
          <div class="link-list" id="updateLinks" hidden></div>
        </div>
      </details>
    </aside>

    <main>
      <div id="map" role="application" aria-label="関東有名ケーキ店・カフェマップ"></div>
      <div class="legend" aria-label="地図アイコン凡例">
        <span class="legend-item"><span class="legend-icon cake">🍰</span>ケーキ</span>
        <span class="legend-item"><span class="legend-icon cafe">☕</span>カフェ</span>
      </div>
      <div class="map-note">駅徒歩は実用目安です。営業時間・定休日・売り切れ・予約可否は訪問前に公式または店舗SNSで確認してください。</div>
    </main>
  </div>

      ["Google: 自由が丘 目黒 世田谷 ケーキ カフェ 名店", "https://www.google.com/search?q=%E8%87%AA%E7%94%B1%E3%81%8C%E4%B8%98+%E7%9B%AE%E9%BB%92+%E4%B8%96%E7%94%B0%E8%B0%B7+%E3%82%B1%E3%83%BC%E3%82%AD+%E3%82%AB%E3%83%95%E3%82%A7+%E5%90%8D%E5%BA%97"],
      ["Google: 池袋 文京 練馬 ケーキ カフェ 名店", "https://www.google.com/search?q=%E6%B1%A0%E8%A2%8B+%E6%96%87%E4%BA%AC+%E7%B7%B4%E9%A6%AC+%E3%82%B1%E3%83%BC%E3%82%AD+%E3%82%AB%E3%83%95%E3%82%A7+%E5%90%8D%E5%BA%97"],
      ["Google: 関東 カフェ 名店", "https://www.google.com/search?q=%E9%96%A2%E6%9D%B1+%E3%82%AB%E3%83%95%E3%82%A7+%E5%90%8D%E5%BA%97"]
    ];

    const areaClass = {
      "tokyo-east": "area-tokyo",
      "tokyo-west": "area-tokyo",
      "tokyo-south": "area-tokyo",
      "tokyo-north": "area-tokyo",
      "kanagawa": "area-kanagawa",
      "saitama": "area-saitama",
      "chiba": "area-chiba",
      "north-kanto": "area-north"
    };

    const typeLabel = {
      top: "名店・遠征級",
      walk: "散歩向き",
      gift: "手土産",
      salon: "イートイン/サロン"
    };

    const categoryLabel = {
      cake: "ケーキ",
      cafe: "カフェ"
    };

    const map = L.map("map", { zoomControl: true }).setView([35.6762, 139.6503], 10);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const markers = new Map();
    let activeCategory = "all";
    let activeType = "all";
    let activeVisited = "all";
    let filtered = shops.slice();
    let visitedSet = loadVisited();

    function loadVisited() {
      try {
        const values = JSON.parse(localStorage.getItem(visitedStorageKey) || "[]");
        return new Set(Array.isArray(values) ? values : []);
      } catch {
        return new Set();
      }
    }

    function saveVisited() {
      localStorage.setItem(visitedStorageKey, JSON.stringify(Array.from(visitedSet)));
    }

    function isVisited(shop) {
      return visitedSet.has(shop.name);
    }

    function toggleVisited(shopName) {
      if (visitedSet.has(shopName)) {
        visitedSet.delete(shopName);
      } else {
        visitedSet.add(shopName);
      }
      saveVisited();
      updateVisitedControls(shopName);
    }

    function updateVisitedControls(shopName) {
      const visited = visitedSet.has(shopName);
      const encodedName = encodeURIComponent(shopName);
      document.querySelectorAll("[data-card-visited], [data-visited-toggle]").forEach(button => {
        const buttonName = button.dataset.cardVisited || button.dataset.visitedToggle;
        if (buttonName !== encodedName) return;
        button.classList.toggle("active", visited);
        button.textContent = visited ? "行った ✓" : "未訪問";
        const card = button.closest(".shop-card");
        if (card) card.classList.toggle("visited", visited);
      });

      const shop = shops.find(item => item.name === shopName);
      const marker = markers.get(shopName);
      if (shop && marker) marker.setPopupContent(popupHtml(shop));
    }

    function loadShops() {
      try {
        const extra = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return mergeShops([...baseShops, ...cafeShops, ...expandedShops], Array.isArray(extra) ? extra : []);
      } catch {
        return [...baseShops, ...cafeShops, ...expandedShops];
      }
    }

    function saveExtraShops(extra) {
      localStorage.setItem(storageKey, JSON.stringify(extra));
      shops = loadShops();
      render();
    }

    function getExtraShops() {
      try {
        const extra = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return Array.isArray(extra) ? extra : [];
      } catch {
        return [];
      }
    }

    function mergeShops(base, additions) {
      const byName = new Map();
      base.forEach(shop => byName.set(shop.name, { ...shop }));
      additions.forEach(shop => {
        if (!shop || !shop.name) return;
        if (shop.status === "closed") {
          byName.delete(shop.name);
          return;
        }
        const existing = byName.get(shop.name) || {};
        byName.set(shop.name, normalizeShop({ ...existing, ...shop }));
      });
      return Array.from(byName.values());
    }

    function normalizeShop(shop) {
      const area = shop.area || areaFromLabel(shop.areaLabel);
      return {
        name: String(shop.name || "").trim(),
        area,
        areaLabel: shop.areaLabel || labelFromArea(area),
        lat: Number(shop.lat),
        lng: Number(shop.lng),
        station: shop.station || "最寄駅要確認",
        walk: shop.walk || "徒歩目安要確認",
        category: shop.category || "cake",
        type: Array.isArray(shop.type) ? shop.type : String(shop.type || "gift").split("|").map(s => s.trim()).filter(Boolean),
        signature: shop.signature || "代表菓子要確認",
        note: shop.note || "追加候補。詳細要確認。",
        url: shop.url || googleMapUrl({ name: shop.name, station: shop.station || "" }),
        score: shop.score || ""
      };
    }

    function areaFromLabel(label) {
      if (/神奈川/.test(label || "")) return "kanagawa";
      if (/埼玉/.test(label || "")) return "saitama";
      if (/千葉/.test(label || "")) return "chiba";
      if (/茨城|栃木|群馬|北関東/.test(label || "")) return "north-kanto";
      if (/南側|城南/.test(label || "")) return "tokyo-south";
      if (/北側|城北/.test(label || "")) return "tokyo-north";
      if (/西側|城西|多摩/.test(label || "")) return "tokyo-west";
      return "tokyo-east";
    }

    function labelFromArea(area) {
      return {
        "tokyo-east": "東京 東側・都心東",
        "tokyo-west": "東京 西側・多摩",
        "tokyo-south": "東京 南側・城南",
        "tokyo-north": "東京 北側",
        "kanagawa": "神奈川",
        "saitama": "埼玉",
        "chiba": "千葉",
        "north-kanto": "北関東"
      }[area] || "東京 東側・都心東";
    }

    const iconCache = new Map();
    function markerIcon(area, category = "cake") {
      const cacheKey = `${area}:${category}`;
      if (iconCache.has(cacheKey)) return iconCache.get(cacheKey);
      const colors = {
        "tokyo-east": "#b23a48",
        "tokyo-west": "#7a3b92",
        "tokyo-south": "#9a4b2f",
        "tokyo-north": "#4e5f9f",
        "kanagawa": "#35628b",
        "saitama": "#2d6a4f",
        "chiba": "#9a6b1f",
        "north-kanto": "#58508d"
      };
      const color = category === "cafe" ? "#35628b" : (colors[area] || "#b23a48");
      const symbol = category === "cafe"
        ? `<path d="M11 14h13v7.5a6.5 6.5 0 0 1-6.5 6.5A6.5 6.5 0 0 1 11 21.5V14z" fill="white"/>
           <path d="M24 16h2.2a3.8 3.8 0 0 1 0 7.6H24v-2.5h2.1a1.3 1.3 0 0 0 0-2.6H24V16z" fill="white"/>
           <path d="M10 30h16" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
           <path d="M13 10c0-2 2-2 2-4M18 10c0-2 2-2 2-4M23 10c0-2 2-2 2-4" stroke="white" stroke-width="1.7" stroke-linecap="round"/>`
        : `<path d="M9 20h16l-2.2 9H11.2L9 20z" fill="white"/>
           <path d="M10.2 14h13.6l2 5H8.2l2-5z" fill="#ffe5e8"/>
           <path d="M13.5 10h7l2.5 3.5H11l2.5-3.5z" fill="white"/>
           <circle cx="17" cy="17" r="1.5" fill="${color}"/>`;
      const svg = encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44">
          <path d="M17 43S2 25.8 2 15.9C2 7.7 8.7 1 17 1s15 6.7 15 14.9C32 25.8 17 43 17 43z" fill="${color}" stroke="white" stroke-width="2"/>
          ${symbol}
        </svg>
      `);
      const icon = L.icon({
        iconUrl: `data:image/svg+xml;charset=UTF-8,${svg}`,
        iconSize: [34, 44],
        iconAnchor: [17, 43],
        popupAnchor: [0, -39]
      });
      iconCache.set(cacheKey, icon);
      return icon;
    }

    function googleMapUrl(shop) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + " " + shop.station)}`;
    }

    function popupHtml(shop) {
      const tags = shop.type.map(t => typeLabel[t]).join(" / ");
      const visited = isVisited(shop);
      return `
        <div class="popup">
          <h3>${shop.name}</h3>
          <p><strong>${categoryLabel[shop.category || "cake"]}</strong>・${shop.areaLabel}・${shop.station} ${shop.walk}</p>
          <p>${shop.signature}</p>
          ${shop.score ? `<p><strong>${shop.score}</strong></p>` : ""}
          <p>${shop.note}</p>
          <p>${tags}</p>
          <button class="visited-toggle ${visited ? "active" : ""}" type="button" data-visited-toggle="${encodeURIComponent(shop.name)}">${visited ? "行った ✓" : "未訪問"}</button><br>
          <a href="${shop.url}" target="_blank" rel="noreferrer">公式/店舗情報を見る</a><br>
          <a href="${googleMapUrl(shop)}" target="_blank" rel="noreferrer">Googleマップで開く</a>
        </div>
      `;
    }

    function setUpdateLog(message) {
      document.getElementById("updateLog").textContent = message;
    }

    function normalize(text) {
      return String(text || "").toLowerCase();
    }

    function matches(shop) {
      const query = normalize(document.getElementById("searchInput").value);
      const area = document.getElementById("areaSelect").value;
      const haystack = normalize([
        shop.name,
        shop.areaLabel,
        shop.station,
        shop.walk,
        categoryLabel[shop.category || "cake"],
        shop.signature,
        shop.note,
        shop.score,
        shop.type.map(t => typeLabel[t]).join(" ")
      ].join(" "));

      const queryOk = !query || haystack.includes(query);
      const areaOk = area === "all" || shop.area === area;
      const categoryOk = activeCategory === "all" || (shop.category || "cake") === activeCategory;
      const typeOk = activeType === "all" || shop.type.includes(activeType);
      const visited = isVisited(shop);
      const visitedOk = activeVisited === "all" || (activeVisited === "visited" && visited) || (activeVisited === "unvisited" && !visited);
      return queryOk && areaOk && categoryOk && typeOk && visitedOk;
    }

    function render() {
      shops = loadShops();
      filtered = shops.filter(matches);
      markerLayer.clearLayers();
      markers.clear();

      filtered.forEach((shop, index) => {
        const marker = L.marker([shop.lat, shop.lng], { icon: markerIcon(shop.area, shop.category || "cake") })
          .bindPopup(popupHtml(shop));
        marker.addTo(markerLayer);
        markers.set(shop.name, marker);
      });

      renderList();
      if (filtered.length) {
        const bounds = L.latLngBounds(filtered.map(s => [s.lat, s.lng]));
        map.fitBounds(bounds.pad(0.18), { maxZoom: 12, animate: false });
      }
    }

    function renderList() {
      const list = document.getElementById("shopList");
      list.innerHTML = "";

      filtered.forEach((shop, index) => {
        const article = document.createElement("article");
        const visited = isVisited(shop);
        article.className = `shop-card${visited ? " visited" : ""}`;
        article.tabIndex = 0;
        article.innerHTML = `
          <div class="shop-title">
            <h3 class="shop-name">${shop.name}</h3>
            <button class="visited-toggle ${visited ? "active" : ""}" type="button" data-card-visited="${encodeURIComponent(shop.name)}">${visited ? "行った ✓" : "未訪問"}</button>
          </div>
          <div class="meta">
            <span class="tag ${areaClass[shop.area]}">${shop.areaLabel}</span>
            <span class="tag">${categoryLabel[shop.category || "cake"]}</span>
            <span class="tag">${shop.station} ${shop.walk}</span>
            ${shop.score ? `<span class="tag">${shop.score}</span>` : ""}
            ${shop.type.map(t => `<span class="tag">${typeLabel[t]}</span>`).join("")}
          </div>
          <p class="note">${shop.signature}。${shop.note}</p>
        `;
        article.addEventListener("click", () => focusShop(shop, article));
        article.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            focusShop(shop, article);
          }
        });
        list.appendChild(article);
      });
    }

    function focusShop(shop, card) {
      document.querySelectorAll(".shop-card.active").forEach(el => el.classList.remove("active"));
      card.classList.add("active");
      const marker = markers.get(shop.name);
      map.setView([shop.lat, shop.lng], 15);
      if (marker) marker.openPopup();
    }

    document.addEventListener("click", (event) => {
      const popupToggle = event.target.closest("[data-visited-toggle]");
      if (popupToggle) {
        event.preventDefault();
        event.stopPropagation();
        toggleVisited(decodeURIComponent(popupToggle.dataset.visitedToggle));
        return;
      }
      const cardToggle = event.target.closest("[data-card-visited]");
      if (cardToggle) {
        event.preventDefault();
        event.stopPropagation();
        toggleVisited(decodeURIComponent(cardToggle.dataset.cardVisited));
      }
    });

    document.getElementById("searchInput").addEventListener("input", render);
    document.getElementById("areaSelect").addEventListener("change", render);
    document.getElementById("categoryChips").addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category;
      document.querySelectorAll("#categoryChips .chip").forEach(chip => chip.classList.remove("active"));
      button.classList.add("active");
      render();
    });
    document.getElementById("typeChips").addEventListener("click", (event) => {
      const button = event.target.closest("[data-type]");
      if (!button) return;
      activeType = button.dataset.type;
      document.querySelectorAll("#typeChips .chip").forEach(chip => chip.classList.remove("active"));
      button.classList.add("active");
      render();
    });
    document.getElementById("visitedChips").addEventListener("click", (event) => {
      const button = event.target.closest("[data-visited]");
      if (!button) return;
      activeVisited = button.dataset.visited;
      document.querySelectorAll("#visitedChips .chip").forEach(chip => chip.classList.remove("active"));
      button.classList.add("active");
      render();
    });

    document.getElementById("runUpdateCheck").addEventListener("click", () => {
      const container = document.getElementById("updateLinks");
      container.hidden = false;
      const sourceLinks = rankingSources
        .map(([label, url]) => ({ label, url, group: "候補探索" }));
      const closureLinks = shops
        .map(shop => {
          const query = `${shop.name} 閉店 営業中 公式`;
          const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
          return { label: `${shop.name} の閉店/営業確認`, url, group: "掲載店確認" };
        });
      const links = [...sourceLinks, ...closureLinks];
      container.innerHTML = links
        .map(({ label, url, group }) => `<a href="${url}" target="_blank" rel="noreferrer">[${group}] ${label}</a>`)
        .join("");

      sourceLinks.slice(0, 8).forEach(({ url }) => window.open(url, "_blank", "noopener,noreferrer"));
      setUpdateLog(`${sourceLinks.length}件の候補探索リンクと${closureLinks.length}件の掲載店確認リンクを生成しました。ブラウザのポップアップ制限がある場合は、下のリンク一覧から開いてください。`);
    });

    function parseUpdates(raw) {
      if (raw.startsWith("[") || raw.startsWith("{")) {
        const parsed = JSON.parse(raw);
        return (Array.isArray(parsed) ? parsed : [parsed]).map(normalizeShopOrClosed);
      }
      return raw.split(/\n+/)
        .map(line => line.trim())
        .filter(line => line && !line.startsWith("店名,カテゴリ,"))
        .map(parseCsvLine)
        .map(normalizeShopOrClosed);
    }

    function normalizeShopOrClosed(row) {
      if (row.status === "closed") return { name: row.name, status: "closed" };
      return normalizeShop(row);
    }

    function parseCsvLine(line) {
      const cols = line.split(",").map(col => col.trim());
      if (cols.length < 11) throw new Error("CSVは 店名,カテゴリ,エリア,緯度,経度,最寄駅,徒歩,タイプ,代表菓子,メモ,URL,スコア任意 の形式で入力してください。");
      return {
        name: cols[0],
        category: cols[1] === "カフェ" || cols[1] === "cafe" ? "cafe" : "cake",
        areaLabel: cols[2],
        area: areaFromLabel(cols[2]),
        lat: cols[3],
        lng: cols[4],
        station: cols[5],
        walk: cols[6],
        type: cols[7].split("|").map(s => s.trim()).filter(Boolean),
        signature: cols[8],
        note: cols[9],
        url: cols[10],
        score: cols[11] || ""
      };
    }

    render();
  </script>
</body>
</html>
